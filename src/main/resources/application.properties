spring.application.name=todo-jwt

# Web Server Port
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/todo_jwt_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

jwt.secret=${JWT_SECRET}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# LINE Bot setting
line.bot.channel-secret=${LINE_CHANNEL_SECRET}
line.bot.channel-token=${LINE_CHANNEL_TOKEN}
line.bot.handler.path=/callback